<!DOCTYPE html>
<html>
<head>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">

<style>

body{
    margin:20px;
    font-family:Arial;
}

#board{
    width:600px;
}

button{
    margin:5px;
}

</style>

</head>

<body>

<h2 id="title">Chess Viewer</h2>

<div id="board"></div>

<br>

<button onclick="prevMove()">◀</button>
<button onclick="nextMove()">▶</button>

<p id="moveCounter"></p>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

<script>

const chess = new Chess();

const board = Chessboard('board',{
    position:'start'
});

let moves = [];
let current = 0;

const urlParams = new URLSearchParams(window.location.search);

const pgn = decodeURIComponent(
    urlParams.get("pgn") || ""
);

if(pgn){

    chess.load_pgn(pgn);

    moves = chess.history();

    chess.reset();

    board.position(chess.fen());

    updateCounter();

}

function nextMove(){

    if(current < moves.length){

        chess.move(moves[current]);

        current++;

        board.position(chess.fen());

        updateCounter();

    }

}

function prevMove(){

    if(current > 0){

        chess.undo();

        current--;

        board.position(chess.fen());

        updateCounter();

    }

}

function updateCounter(){

    document.getElementById("moveCounter")
    .innerText =
    current + " / " + moves.length;

}

</script>

</body>
</html>

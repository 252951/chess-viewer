<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chess Viewer</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard-1.0.0.min.css">

<style>
body{
    font-family: Arial, sans-serif;
    padding:20px;
}

#board{
    width:600px;
    max-width:100%;
}

.controls{
    margin-top:15px;
}

button{
    padding:8px 15px;
    margin-right:10px;
    cursor:pointer;
}

#counter{
    margin-top:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<h2>Chess Viewer</h2>

<div id="board"></div>

<div class="controls">
    <button onclick="prevMove()">◀</button>
    <button onclick="nextMove()">▶</button>
</div>

<div id="counter">0 / 0</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard-1.0.0.min.js"></script>

<script>

let board;
let chess = new Chess();

let moves = [];
let currentMove = 0;

function getPGN(){

    const params = new URLSearchParams(window.location.search);

    return params.get("pgn")
        ? decodeURIComponent(params.get("pgn"))
        : "";
}

function updateCounter(){

    document.getElementById("counter").innerText =
        currentMove + " / " + moves.length;
}

function nextMove(){

    if(currentMove >= moves.length)
        return;

    chess.move(moves[currentMove]);

    currentMove++;

    board.position(chess.fen());

    updateCounter();
}

function prevMove(){

    if(currentMove <= 0)
        return;

    chess.undo();

    currentMove--;

    board.position(chess.fen());

    updateCounter();
}

window.onload = function(){

    board = Chessboard("board",{

        position:"start",

        pieceTheme:
        "https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png"

    });

    const pgn = getPGN();

    if(pgn){

        const tempChess = new Chess();

        const loaded = tempChess.load_pgn(pgn);

        if(loaded){

            moves = tempChess.history();

            console.log("PGN loaded");

            console.log(moves);

        }
        else{

            console.error("PGN load failed");

        }
    }

    updateCounter();
};

</script>

</body>
</html>

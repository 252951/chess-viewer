<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Chess Viewer</title>

<style>
body {
    font-family: Arial, sans-serif;
    padding: 20px;
}

h2 {
    margin-bottom: 10px;
}

#board {
    display: grid;
    grid-template-columns: repeat(8, 64px);
    grid-template-rows: repeat(8, 64px);
    width: 512px;
    border: 2px solid #333;
}

.square {
    width: 64px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 42px;
}

.light {
    background-color: #f0d9b5;
}

.dark {
    background-color: #b58863;
}

.controls {
    margin-top: 15px;
}

button {
    padding: 8px 15px;
    margin-right: 10px;
    cursor: pointer;
    font-size: 16px;
}

#counter {
    margin-top: 10px;
    font-weight: bold;
    color: #FFFFFF;
}
</style>
</head>

<body>

<div id="board"></div>

<div class="controls">
    <button onclick="prevMove()">◀</button>
    <button onclick="nextMove()">▶</button>
</div>

<div id="counter">0 / 0</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

<script>
let chess = new Chess();
let moves = [];
let currentMove = 0;

const pieces = {
    p: "♟", r: "♜", n: "♞", b: "♝", q: "♛", k: "♚",
    P: "♙", R: "♖", N: "♘", B: "♗", Q: "♕", K: "♔"
};

function getPGN() {
    const params = new URLSearchParams(window.location.search);
    return params.get("pgn") ? decodeURIComponent(params.get("pgn")) : "";
}

function drawBoard() {
    const boardDiv = document.getElementById("board");
    boardDiv.innerHTML = "";

    const fenBoard = chess.fen().split(" ")[0];
    const rows = fenBoard.split("/");

    for (let rank = 0; rank < 8; rank++) {
        let file = 0;

        for (const char of rows[rank]) {
            if (!isNaN(char)) {
                for (let i = 0; i < Number(char); i++) {
                    addSquare(rank, file, "");
                    file++;
                }
            } else {
                addSquare(rank, file, pieces[char]);
                file++;
            }
        }
    }
}

function addSquare(rank, file, piece) {
    const square = document.createElement("div");
    square.className = "square " + ((rank + file) % 2 === 0 ? "light" : "dark");
    square.textContent = piece;
    document.getElementById("board").appendChild(square);
}

function updateCounter() {
    document.getElementById("counter").innerText =
        currentMove + " / " + moves.length;
}

function nextMove() {
    if (currentMove >= moves.length) return;

    chess.move(moves[currentMove]);
    currentMove++;

    drawBoard();
    updateCounter();
}

function prevMove() {
    if (currentMove <= 0) return;

    chess.undo();
    currentMove--;

    drawBoard();
    updateCounter();
}

window.onload = function() {
    const pgn = getPGN();

    if (pgn) {
        const tempChess = new Chess();

        if (tempChess.load_pgn(pgn)) {
            moves = tempChess.history();
        } else {
            console.error("Nie udało się wczytać PGN");
        }
    }

    drawBoard();
    updateCounter();
};
</script>

</body>
</html>
